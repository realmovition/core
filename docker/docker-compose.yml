services:
  cyber-dev:
    build:
      context: ..
      dockerfile: docker/dev.x86_64.dockerfile
    container_name: ubuntu2204
    image: cyber-core:latest

    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"

    environment:
      - HOST_USER=${HOST_USER:-developer}
      - HOST_UID=${HOST_UID:-1000}
      - HOST_GID=${HOST_GID:-1000}
      - HOME=/home/${HOST_USER:-developer}
      
    volumes:
      - ..:/workspace
      - ${BAZEL_CACHE:-/tmp/bazel-apollo-docker}:/home/${HOST_USER:-developer}/.cache/bazel
      
    working_dir: /workspace
    ipc: host
    network_mode: host
    privileged: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    tty: true
    stdin_open: true
    restart: unless-stopped
