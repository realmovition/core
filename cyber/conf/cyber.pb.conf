transport_conf {
    shm_conf {
        notifier_type: "multicast"
    }
    communication_mode {
        same_proc: INTRA
        diff_proc: ICEORYX
        diff_host: RTPS
    }
    slow_consumer_policy: DROP
}

run_mode_conf {
    run_mode: MODE_REALITY
    clock_mode: MODE_CYBER
}

scheduler_conf {
    routine_num: 100
    default_proc_num: 16
}
