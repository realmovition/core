name: pycyber release

on:
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/release-pycyber.yml"
      - "packaging/pycyber/**"
      - "scripts/release/build_and_package_pycyber.sh"
      - "scripts/release/build_release_artifacts.sh"
      - "scripts/release/check_bzlmod_lockfile.sh"
      - "scripts/release/generate_pycyber_api_docs.py"
      - "scripts/release/install_and_generate_docs.sh"
      - "scripts/release/build_pycyber.py"
      - "scripts/release/validate_pycyber.py"
      - ".bazelrc"
      - ".bazelversion"
      - "cyber/**"
      - "MODULE.bazel"
      - "MODULE.bazel.lock"
  push:
    branches: ["main"]
    tags:
      - "pycyber-v*"
    paths:
      - ".github/workflows/release-pycyber.yml"
      - "packaging/pycyber/**"
      - "scripts/release/build_and_package_pycyber.sh"
      - "scripts/release/build_release_artifacts.sh"
      - "scripts/release/check_bzlmod_lockfile.sh"
      - "scripts/release/generate_pycyber_api_docs.py"
      - "scripts/release/install_and_generate_docs.sh"
      - "scripts/release/build_pycyber.py"
      - "scripts/release/validate_pycyber.py"
      - ".bazelrc"
      - ".bazelversion"
      - "cyber/**"
      - "MODULE.bazel"
      - "MODULE.bazel.lock"
  workflow_dispatch:

jobs:
  build-wheel:
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_suffix: linux-x86_64
            runs_on: ubuntu-22.04
            skip_sdist: false
          - artifact_suffix: linux-aarch64
            runs_on: ubuntu-22.04-arm
            skip_sdist: true
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bazel
        run: sudo bash scripts/deps/install_bazel.sh

      - name: Install wheel build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf
          python -m pip install --upgrade pip
          python -m pip install build auditwheel twine setuptools_scm

      - name: Check Bzlmod lockfile
        run: bash scripts/release/check_bzlmod_lockfile.sh --check

      - name: Build and package pycyber
        shell: bash
        run: |
          args=()
          if [[ "${{ matrix.skip_sdist }}" == "true" ]]; then
            args+=(--skip-sdist)
          fi
          PYTHON=python3.11 bash scripts/release/build_and_package_pycyber.sh "${args[@]}"

      - uses: actions/upload-artifact@v4
        with:
          name: pycyber-${{ matrix.artifact_suffix }}
          if-no-files-found: error
          path: |
            packaging/pycyber/wheelhouse/*.tar.gz
            packaging/pycyber/wheelhouse/*.whl

  verify-python-compat:
    needs: build-wheel
    strategy:
      fail-fast: false
      matrix:
        artifact_suffix: [linux-x86_64, linux-aarch64]
        python-version: ["3.11"]
    runs-on: ${{ matrix.artifact_suffix == 'linux-aarch64' && 'ubuntu-22.04-arm' || 'ubuntu-22.04' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/download-artifact@v4
        with:
          name: pycyber-${{ matrix.artifact_suffix }}
          path: dist

      - name: Validate wheel install/import on Python ${{ matrix.python-version }}
        shell: bash
        run: |
          wheel="$(ls dist/*.whl | head -n1)"
          python scripts/release/validate_pycyber.py --python python --wheel "$wheel"

  publish:
    needs: [build-wheel, verify-python-compat]
    if: startsWith(github.ref, 'refs/tags/pycyber-v')
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: pycyber-*
          path: dist
          merge-multiple: true

      - name: Show collected distributions
        run: ls -1 dist

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
