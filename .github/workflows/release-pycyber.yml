name: pycyber release

on:
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/release-pycyber.yml"
      - "packaging/pycyber/**"
      - "scripts/release/build_pycyber.py"
      - "scripts/release/validate_pycyber.py"
      - "cyber/**"
      - "MODULE.bazel"
      - "MODULE.bazel.lock"
      - "WORKSPACE"
  push:
    branches: ["main"]
    tags:
      - "pycyber-v*"
    paths:
      - ".github/workflows/release-pycyber.yml"
      - "packaging/pycyber/**"
      - "scripts/release/build_pycyber.py"
      - "scripts/release/validate_pycyber.py"
      - "cyber/**"
      - "MODULE.bazel"
      - "MODULE.bazel.lock"
      - "WORKSPACE"
  workflow_dispatch:

jobs:
  build-wheel:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Bazel
        run: sudo bash scripts/deps/install_bazel.sh

      - name: Install wheel build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf
          python3 -m pip install --upgrade pip
          python3 -m pip install build auditwheel

      - name: Stage pycyber package
        run: python3 scripts/release/build_pycyber.py

      - name: Build wheel
        run: python3 -m build --wheel packaging/pycyber

      - name: Repair wheel
        run: auditwheel repair packaging/pycyber/dist/*.whl -w packaging/pycyber/wheelhouse

      - name: Smoke test wheel
        run: python3 scripts/release/validate_pycyber.py --wheel packaging/pycyber/wheelhouse/*.whl

      - uses: actions/upload-artifact@v4
        with:
          name: pycyber-wheel
          path: packaging/pycyber/wheelhouse/*.whl

  publish:
    needs: build-wheel
    if: startsWith(github.ref, 'refs/tags/pycyber-v')
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pycyber-wheel
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
